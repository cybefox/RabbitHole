<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>RabbitHole — Login</title>
  <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
  <style>
    * { box-sizing: border-box; margin: 0; padding: 0; }

    body {
      min-height: 100vh;
      background: #0a0a0f;
      display: flex;
      align-items: center;
      justify-content: center;
      font-family: 'Segoe UI', system-ui, sans-serif;
      overflow: hidden;
    }

    /* Animated background grid */
    body::before {
      content: '';
      position: fixed;
      inset: 0;
      background-image:
        linear-gradient(rgba(99,102,241,.07) 1px, transparent 1px),
        linear-gradient(90deg, rgba(99,102,241,.07) 1px, transparent 1px);
      background-size: 40px 40px;
      animation: gridMove 20s linear infinite;
      z-index: 0;
    }

    @keyframes gridMove {
      0%   { transform: translateY(0); }
      100% { transform: translateY(40px); }
    }

    /* Glow blobs */
    .blob {
      position: fixed;
      border-radius: 50%;
      filter: blur(80px);
      opacity: 0.18;
      z-index: 0;
    }
    .blob-1 { width: 400px; height: 400px; background: #6366f1; top: -100px; left: -100px; animation: float 8s ease-in-out infinite; }
    .blob-2 { width: 300px; height: 300px; background: #8b5cf6; bottom: -80px; right: -80px; animation: float 10s ease-in-out infinite reverse; }
    .blob-3 { width: 200px; height: 200px; background: #06b6d4; top: 50%; left: 50%; animation: float 12s ease-in-out infinite 2s; }

    @keyframes float {
      0%, 100% { transform: translate(0, 0) scale(1); }
      50%       { transform: translate(30px, -30px) scale(1.05); }
    }

    .card-wrapper {
      position: relative;
      z-index: 1;
      width: 100%;
      max-width: 420px;
      padding: 1rem;
    }

    .login-card {
      background: rgba(15, 15, 25, 0.85);
      border: 1px solid rgba(99,102,241,0.25);
      border-radius: 20px;
      padding: 2.5rem 2rem;
      backdrop-filter: blur(20px);
      box-shadow: 0 0 60px rgba(99,102,241,0.15), 0 20px 60px rgba(0,0,0,0.5);
    }

    .logo {
      text-align: center;
      margin-bottom: 1.8rem;
    }

    .logo .rabbit {
      font-size: 3.5rem;
      display: block;
      animation: bounce 2s ease-in-out infinite;
    }

    @keyframes bounce {
      0%, 100% { transform: translateY(0); }
      50%       { transform: translateY(-8px); }
    }

    .logo h1 {
      color: #fff;
      font-size: 1.7rem;
      font-weight: 700;
      letter-spacing: 1px;
      margin-top: .4rem;
    }

    .logo p {
      color: #6366f1;
      font-size: .8rem;
      letter-spacing: 3px;
      text-transform: uppercase;
      margin-top: .2rem;
    }

    .form-label {
      color: #a0a0b8;
      font-size: .82rem;
      font-weight: 500;
      letter-spacing: .5px;
      text-transform: uppercase;
      margin-bottom: .4rem;
    }

    .form-control {
      background: rgba(255,255,255,0.05);
      border: 1px solid rgba(99,102,241,0.3);
      border-radius: 10px;
      color: #fff;
      padding: .7rem 1rem;
      font-size: .95rem;
      transition: all .2s;
    }

    .form-control:focus {
      background: rgba(99,102,241,0.1);
      border-color: #6366f1;
      box-shadow: 0 0 0 3px rgba(99,102,241,0.2);
      color: #fff;
    }

    .form-control::placeholder { color: #444460; }

    /* CAPTCHA box */
    .captcha-box {
      display: flex;
      align-items: center;
      gap: .75rem;
      background: rgba(99,102,241,0.08);
      border: 1px solid rgba(99,102,241,0.2);
      border-radius: 10px;
      padding: .7rem 1rem;
    }

    .captcha-question {
      color: #c7d2fe;
      font-weight: 600;
      font-size: 1rem;
      white-space: nowrap;
      flex-shrink: 0;
    }

    .captcha-box .form-control {
      background: transparent;
      border: none;
      border-bottom: 1px solid rgba(99,102,241,0.4);
      border-radius: 0;
      padding: 0 .5rem;
      max-width: 80px;
      text-align: center;
      font-size: 1rem;
      color: #fff;
    }

    .captcha-box .form-control:focus {
      background: transparent;
      box-shadow: none;
      border-bottom-color: #6366f1;
    }

    .btn-login {
      width: 100%;
      padding: .75rem;
      border-radius: 10px;
      background: linear-gradient(135deg, #6366f1, #8b5cf6);
      border: none;
      color: #fff;
      font-size: 1rem;
      font-weight: 600;
      letter-spacing: .5px;
      margin-top: .5rem;
      transition: all .2s;
      position: relative;
      overflow: hidden;
    }

    .btn-login::after {
      content: '';
      position: absolute;
      inset: 0;
      background: rgba(255,255,255,0);
      transition: background .2s;
    }

    .btn-login:hover::after { background: rgba(255,255,255,0.08); }
    .btn-login:active { transform: scale(0.98); }

    .error-alert {
      background: rgba(239,68,68,0.12);
      border: 1px solid rgba(239,68,68,0.35);
      border-radius: 10px;
      color: #fca5a5;
      padding: .65rem 1rem;
      font-size: .88rem;
      margin-bottom: 1.2rem;
      display: flex;
      align-items: center;
      gap: .5rem;
    }

    .divider {
      height: 1px;
      background: rgba(99,102,241,0.15);
      margin: 1.5rem 0;
    }

    .footer-text {
      text-align: center;
      color: #3d3d5c;
      font-size: .75rem;
      margin-top: 1.5rem;
    }
  </style>
</head>
<body>
  <div class="blob blob-1"></div>
  <div class="blob blob-2"></div>
  <div class="blob blob-3"></div>

  <div class="card-wrapper">
    <div class="login-card">

      <div class="logo">
        <span class="rabbit">🐇</span>
        <h1>RabbitHole</h1>
        <p>Simulation Platform</p>
      </div>

      {% if error %}
        <div class="error-alert">⚠️ {{ error }}</div>
      {% endif %}

      <form method="post" autocomplete="off">
        <div class="mb-3">
          <label class="form-label">Username</label>
          <input type="text" name="username" class="form-control" placeholder="Enter username" required autofocus>
        </div>

        <div class="mb-3">
          <label class="form-label">Password</label>
          <input type="password" name="password" class="form-control" placeholder="••••••••" required>
        </div>

        <div class="divider"></div>

        <div class="mb-4">
          <label class="form-label">Security Check</label>
          <div class="captcha-box">
            <span class="captcha-question">{{ captcha_question }} =</span>
            <input type="number" name="captcha_answer" class="form-control"
                   placeholder="?" required autocomplete="off">
          </div>
        </div>

        <button type="submit" class="btn-login">Sign In →</button>
      </form>

    </div>
    <div class="footer-text">RabbitHole &copy; {{ 2026 }} — Authorized use only</div>
  </div>
</body>
</html>
